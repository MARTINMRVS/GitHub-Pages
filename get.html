<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#080812">
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">
<title>Descarga Wattai — Tu calculadora de consumo eléctrico</title>
<meta name="description" content="Descarga Wattai en iPhone. Pronto disponible en Android. Calculá el consumo eléctrico real de tus electrodomésticos en segundos.">
<link rel="canonical" href="https://wattai.app/get">
<meta name="robots" content="index,follow">

<meta property="og:title" content="Descarga Wattai">
<meta property="og:description" content="Tu calculadora de consumo eléctrico — disponible en App Store. Pronto en Android.">
<meta property="og:url" content="https://wattai.app/get">
<meta property="og:image" content="https://wattai.app/assets/wattai-mark.png">
<meta property="og:type" content="website">

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden}
  body{
    background:#080812;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  /* subtle radial glow background */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(232,146,58,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(232,146,58,0.08) 0%, transparent 55%);
    pointer-events:none;
    z-index:0;
  }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px 24px 16px;
    position:relative;
    z-index:1;
    text-align:center;
    gap:28px;
    max-width:480px;
    width:100%;
    margin:0 auto;
  }
  .brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
  }
  .brand img{
    width:96px;
    height:auto;
    display:block;
    filter:drop-shadow(0 8px 24px rgba(232,146,58,0.25));
  }
  h1{
    font-size:34px;
    font-weight:700;
    letter-spacing:-0.02em;
    line-height:1.05;
    color:#fff;
  }
  .sub{
    font-size:16px;
    line-height:1.4;
    color:rgba(255,255,255,0.7);
    max-width:320px;
  }
  .actions{
    display:flex;
    flex-direction:column;
    gap:14px;
    width:100%;
    max-width:340px;
  }
  /* Apple App Store badge — official white badge with black text */
  .btn-apple{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    background:#fff;
    color:#000;
    height:56px;
    border-radius:12px;
    text-decoration:none;
    padding:0 22px;
    transition:transform 180ms ease,opacity 180ms ease,box-shadow 180ms ease;
    box-shadow:0 4px 16px rgba(0,0,0,0.35);
    will-change:transform;
  }
  .btn-apple:active{transform:scale(0.97)}
  .btn-apple .apple-logo{
    width:26px;
    height:26px;
    flex-shrink:0;
  }
  .btn-apple .txt{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    line-height:1;
  }
  .btn-apple .txt .small{
    font-size:11px;
    font-weight:400;
    letter-spacing:0.02em;
    color:#000;
  }
  .btn-apple .txt .big{
    font-size:20px;
    font-weight:600;
    letter-spacing:-0.01em;
    margin-top:3px;
    color:#000;
  }

  /* Android — Wattai bencina background, green Android logo */
  .btn-android{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    background:#E8923A;
    color:#fff;
    height:56px;
    border-radius:12px;
    text-decoration:none;
    padding:0 22px;
    transition:transform 180ms ease,opacity 180ms ease,box-shadow 180ms ease;
    box-shadow:0 4px 16px rgba(232,146,58,0.35);
    will-change:transform;
  }
  .btn-android:active{transform:scale(0.97)}
  .btn-android .android-logo{
    width:26px;
    height:26px;
    flex-shrink:0;
  }
  .btn-android .txt{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    line-height:1;
  }
  .btn-android .txt .small{
    font-size:11px;
    font-weight:500;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.85);
  }
  .btn-android .txt .big{
    font-size:18px;
    font-weight:600;
    letter-spacing:-0.01em;
    margin-top:3px;
    color:#fff;
  }

  /* dim state when other platform is preferred */
  .dim{opacity:0.5}
  .dim:hover,.dim:active{opacity:0.7}
  .featured{
    box-shadow:0 6px 24px rgba(255,255,255,0.18),0 0 0 1px rgba(255,255,255,0.06);
  }
  .btn-android.featured{
    box-shadow:0 6px 24px rgba(232,146,58,0.55),0 0 0 1px rgba(232,146,58,0.4);
  }

  footer{
    padding:14px 24px calc(18px + env(safe-area-inset-bottom));
    text-align:center;
    font-size:13px;
    color:rgba(255,255,255,0.45);
    position:relative;
    z-index:1;
  }
  footer a{
    color:rgba(255,255,255,0.6);
    text-decoration:none;
    border-bottom:1px solid rgba(255,255,255,0.18);
    padding-bottom:1px;
  }
  footer a:hover{color:#fff;border-color:rgba(255,255,255,0.5)}

  /* small phones */
  @media (max-height:640px){
    main{gap:18px;padding:16px 24px 8px}
    .brand img{width:76px}
    h1{font-size:28px}
    .sub{font-size:15px}
    .actions{gap:10px}
  }
  /* tablet/desktop */
  @media (min-width:768px){
    h1{font-size:42px}
    .sub{font-size:18px;max-width:380px}
    .brand img{width:108px}
  }
</style>
</head>
<body>

<main>
  <div class="brand">
    <img src="assets/wattai-mark.png" alt="Wattai" width="96" height="53">
  </div>

  <div>
    <h1>Descarga Wattai</h1>
    <p class="sub">Tu calculadora de consumo eléctrico</p>
  </div>

  <div class="actions">
    <a id="btn-apple" class="btn-apple" href="https://apps.apple.com/cl/app/wattai-consumo-el%C3%A9ctrico/id6761498514" aria-label="Descargar en App Store">
      <svg class="apple-logo" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="#000" d="M17.05 12.04c-.03-3.13 2.56-4.63 2.67-4.7-1.46-2.13-3.73-2.42-4.54-2.46-1.94-.2-3.78 1.14-4.77 1.14-.99 0-2.5-1.11-4.11-1.08-2.12.03-4.07 1.23-5.16 3.13-2.2 3.81-.56 9.45 1.59 12.55 1.05 1.51 2.31 3.21 3.96 3.15 1.59-.06 2.19-1.03 4.11-1.03 1.92 0 2.46 1.03 4.14.99 1.71-.03 2.79-1.54 3.83-3.06 1.21-1.76 1.71-3.46 1.74-3.55-.04-.02-3.34-1.28-3.46-5.08zM14.06 3.41c.86-1.05 1.45-2.5 1.29-3.95-1.25.05-2.78.84-3.68 1.88-.8.92-1.51 2.4-1.32 3.81 1.4.11 2.83-.71 3.71-1.74z"/>
      </svg>
      <span class="txt">
        <span class="small">Download on the</span>
        <span class="big">App Store</span>
      </span>
    </a>

    <a id="btn-android" class="btn-android" href="https://wattai.app" aria-label="Pronto en Android">
      <svg class="android-logo" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="#A4C639" d="M17.523 15.341c-.554 0-1-.448-1-1s.446-1 1-1 1 .448 1 1-.446 1-1 1m-11.046 0c-.554 0-1-.448-1-1s.446-1 1-1 1 .448 1 1-.446 1-1 1m11.404-6.041l1.997-3.46a.416.416 0 0 0-.152-.568.416.416 0 0 0-.568.152l-2.022 3.503A12.43 12.43 0 0 0 12 7.692c-1.846 0-3.583.397-5.135 1.235L4.842 5.424a.416.416 0 0 0-.568-.152.416.416 0 0 0-.152.568L6.119 9.3C2.665 11.18.317 14.692 0 18.808h24c-.317-4.116-2.665-7.628-6.119-9.508"/>
      </svg>
      <span class="txt">
        <span class="small">Pronto en</span>
        <span class="big">Android</span>
      </span>
    </a>
  </div>

  <!-- Enlace creador - debajo de botones, arriba del footer -->
  <a href="https://martinmake.com" target="_blank" rel="noopener"
     style="
       display: inline-flex;
       align-items: center;
       gap: 8px;
       margin-top: 28px;
       padding: 8px 16px;
       border-radius: 20px;
       background: rgba(255,255,255,0.06);
       text-decoration: none;
       transition: background 0.2s ease;
     "
     onmouseover="this.style.background='rgba(255,255,255,0.12)'"
     onmouseout="this.style.background='rgba(255,255,255,0.06)'"
  >
    <img src="/assets/martin-sticker.png" alt=""
         style="width:28px; height:28px; border-radius:6px;">
    <span style="color:rgba(255,255,255,0.5); font-size:13px; font-family:-apple-system,system-ui,sans-serif;">
      made by Martin
    </span>
  </a>
</main>

<footer>
  <a href="https://wattai.app">wattai.app</a>
</footer>

<script>
  (function(){
    var ua = (navigator.userAgent || '').toLowerCase();
    var isIOS = /iphone|ipad|ipod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    var isAndroid = /android/.test(ua);
    var apple = document.getElementById('btn-apple');
    var android = document.getElementById('btn-android');
    if (isIOS && !isAndroid){
      apple.classList.add('featured');
      android.classList.add('dim');
    } else if (isAndroid && !isIOS){
      android.classList.add('featured');
      apple.classList.add('dim');
    }
  })();
</script>

</body>
</html>
